<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <script src="https://p.trellocdn.com/power-up.min.js"></script>
    <script src="./approvals.js"></script>
    <style>
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica,
          Arial, sans-serif;
        background: #1d2125;
        color: #b6c2cf;
        overflow-y: auto;
      }
      .wrap {
        padding: 12px;
      }

      /* --- COMPACT REQUESTS CONTAINER & CARDS STYLE --- */
      /* --- FIXED MULTI-LINE COMPACT CARDS STYLE --- */
      .requests-list {
        display: flex;
        flex-direction: column;
        gap: 8px;
        width: 100%;
      }
      .request-row {
        background: #22272b;
        border: 1px solid #3d444d;
        border-radius: 8px;
        padding: 10px 12px; /* Slightly tighter than original, but spacious enough for 2 lines */
        cursor: pointer;
        display: flex;
        flex-direction: column;
        gap: 8px;
        transition:
          background 0.15s ease,
          border-color 0.15s ease;
      }
      .request-row:hover {
        background: #2c333a;
        border-color: #738496;
      }
      .request-main {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        gap: 16px;
      }
      .request-content-wrapper {
        display: flex;
        gap: 8px;
        align-items: flex-start; /* Top align icon with wrap text */
        min-width: 0;
        flex: 1;
      }
      .card-decor-icon {
        margin-top: 2px; /* Centers icon alignment nicely with the first line of text */
        font-size: 13px;
        color: #9fadbc;
        flex-shrink: 0;
      }
      .request-text {
        font-size: 13px;
        color: #b6c2cf;
        line-height: 1.4; /* Clean spacing between wrapped rows */
        white-space: normal; /* FIX: Allows text to wrap to multiple lines */
        word-break: break-word;
      }
      .request-text b {
        color: #fff;
        font-weight: 600;
      }
      .request-time {
        font-size: 11px;
        color: #9fadbc;
        white-space: nowrap;
        flex-shrink: 0;
        padding-top: 2px;
      }
      .request-actions {
        display: flex;
        justify-content: flex-end;
        gap: 8px;
      }
      .action-btn {
        appearance: none;
        border: none;
        border-radius: 6px;
        padding: 6px 12px;
        font-size: 12px;
        font-weight: 600;
        cursor: pointer;
        display: flex;
        align-items: center;
        gap: 4px;
      }
      .approve-btn {
        background: #1c3829;
        color: #4bce97;
      }
      .approve-btn:hover:not(:disabled) {
        background: #204b30;
      }
      .decline-btn {
        background: #3d1f1f;
        color: #f87168;
      }
      .decline-btn:hover:not(:disabled) {
        background: #4a2323;
      }
      .action-btn:disabled {
        opacity: 0.5;
        cursor: default;
      }
      .request-row.responded .request-actions {
        display: none;
      }
      .response-pill {
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.03em;
        padding: 4px 10px;
        border-radius: 12px;
        align-self: flex-end;
      }
      .response-pill.approved {
        background: #1c3829;
        color: #4bce97;
      }
      .response-pill.declined {
        background: #3d1f1f;
        color: #f87168;
      }

      .requests-empty {
        padding: 24px;
        font-size: 13px;
        color: #9fadbc;
        text-align: center;
        background: #22272b;
        border-radius: 8px;
        border: 1px dashed #3d444d;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="requests-list" id="requestsList"></div>
      <div class="requests-empty" id="requestsEmpty" style="display: none">
        No approval requests are waiting on you right now.
      </div>
    </div>

    <script>
      var t = window.TrelloPowerUp.iframe();
      var API_KEY = "be0af9c0de485c191cd377fdcb42e793";
      var PLUGIN_ID = "6a468ccfcafdf3b68af7fa8f";

      var requestsList = document.getElementById("requestsList");
      var requestsEmpty = document.getElementById("requestsEmpty");
      var currentToken = null;
      var currentMemberId = null;

      function escapeHtml(str) {
        if (!str) return "";
        var map = {
          "&": "&amp;",
          "<": "&lt;",
          ">": "&gt;",
          '"': "&quot;",
          "'": "&#39;",
        };
        return str.replace(/[&<>"']/g, function (c) {
          return map[c];
        });
      }

      function renderRequestsList(requests) {
        if (!requests || requests.length === 0) {
          requestsList.innerHTML = "";
          requestsEmpty.style.display = "block";
          t.sizeTo("body").catch(function () {});
          return;
        }

        requestsEmpty.style.display = "none";
        requestsList.innerHTML = requests
          .map(function (r) {
            var cardUrl = r.cardShortLink
              ? "https://trello.com/c/" + r.cardShortLink
              : "";
            return (
              '<div class="request-row" data-url="' +
              cardUrl +
              '" data-card-id="' +
              r.cardId +
              '">' +
              '<div class="request-main">' +
              '<div class="request-content-wrapper">' +
              '<span class="card-decor-icon">📋</span> ' +
              '<div class="request-text">' +
              "<b>" +
              escapeHtml(r.requesterName || "Someone") +
              "</b> requested <br>" +
              "your approval on <b>" +
              escapeHtml(r.cardName || "Untitled") +
              "</b>" +
              "</div>" +
              "</div>" +
              '<div class="request-time">' +
              ApprovalsShared.timeAgo(r.createdAt) +
              "</div>" +
              "</div>" +
              '<div class="request-actions">' +
              '<button class="action-btn approve-btn" data-action="approved">✓ Approve</button>' +
              '<button class="action-btn decline-btn" data-action="declined">✕ Decline</button>' +
              "</div>" +
              "</div>"
            );
          })
          .join("");

        Array.prototype.forEach.call(
          requestsList.querySelectorAll(".request-row"),
          function (row) {
            row.addEventListener("click", function () {
              var url = row.getAttribute("data-url");
              if (url) t.navigate({ url: url });
            });

            Array.prototype.forEach.call(
              row.querySelectorAll(".action-btn"),
              function (btn) {
                btn.addEventListener("click", function (e) {
                  // Stop this from also triggering the row's "navigate to
                  // card" click handler above.
                  e.stopPropagation();
                  handleRespond(row, btn.getAttribute("data-action"));
                });
              },
            );
          },
        );

        t.sizeTo("body").catch(function () {});
      }

      function handleRespond(row, newStatus) {
        var cardId = row.getAttribute("data-card-id");
        var buttons = row.querySelectorAll(".action-btn");

        Array.prototype.forEach.call(buttons, function (b) {
          b.disabled = true;
        });

        ApprovalsShared.respondToRequestFromBoard(
          t,
          currentCardId,
          myId,
          action,
        )
          .then(function (updatedRequest) {
            console.log("Success! Card updated natively.");
            // This request  is no longer "pending your approval" — replace
            // the action buttons with a small status pill and stop the row
            // from navigating to the card on click.
            row.classList.add("responded");
            var actions = row.querySelector(".request-actions");
            actions.innerHTML =
              '<span class="response-pill ' +
              newStatus +
              '">' +
              (newStatus === "approved" ? "Approved" : "Declined") +
              "</span>";
            t.sizeTo("body").catch(function () {});
          })
          .catch(function (err) {
            console.error("Easy Approve: failed to update request", err);
          });
      }

      function loadPendingRequests() {
        return t.get("member", "private", "token").then(function (token) {
          if (!token) return renderRequestsList([]);
          currentToken = token;

          return Promise.all([t.board("id"), t.member("id")])
            .then(function (results) {
              var boardId = results[0].id;
              currentMemberId = results[1].id;
              var url =
                "https://api.trello.com/1/boards/" +
                boardId +
                "/cards?pluginData=true&fields=id,name,shortLink&key=" +
                API_KEY +
                "&token=" +
                encodeURIComponent(token);

              return fetch(url).then(function (res) {
                if (!res.ok) throw new Error("Failed to fetch board cards");
                return res.json().then(function (cards) {
                  return ApprovalsShared.getPendingRequestsForMember(
                    cards,
                    currentMemberId,
                    PLUGIN_ID,
                  );
                });
              });
            })
            .then(renderRequestsList)
            .catch(function (err) {
              console.error("Failed loading requests", err);
              renderRequestsList([]);
            });
        });
      }

      loadPendingRequests();
    </script>
  </body>
</html>
