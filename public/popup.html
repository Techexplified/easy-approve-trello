<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <script src="https://p.trellocdn.com/power-up.min.js"></script>
    <script src="./approvals.js"></script>
    <style>
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica,
          Arial, sans-serif;
        background: #1d2125;
        color: #b6c2cf;
        /* FIX: Let Trello handle frame resizing naturally based on document content height */
        overflow-y: auto;
      }
      .wrap {
        padding: 16px;
        text-align: center;
      }
      .icon-circle,
      .success-icon {
        width: 48px;
        height: 48px;
        margin: 0 auto 12px;
        border-radius: 50%;
        background: #1c3829;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .icon-circle svg,
      .success-icon svg {
        width: 24px;
        height: 24px;
      }
      h2 {
        margin: 0 0 4px;
        font-size: 15px;
        font-weight: 600;
        color: #fff;
      }
      p.desc {
        margin: 0 0 16px;
        font-size: 13px;
        line-height: 1.5;
        color: #9fadbc;
      }
      .btn {
        appearance: none;
        border: none;
        width: 100%;
        padding: 10px 16px;
        font-size: 14px;
        font-weight: 600;
        border-radius: 8px;
        cursor: pointer;
        background: #579dff;
        color: #091e42;
        transition: background 0.15s ease;
      }
      .btn:hover {
        background: #85b8ff;
      }
      .btn:disabled {
        background: #2c333a;
        color: #738496;
        cursor: default;
      }

      .success-view {
        display: none;
      }
      .success-view.show {
        display: block;
      }
      .default-view.hide {
        display: none;
      }

      /* --- NEW REQUESTS CONTAINER & CARDS STYLE --- */
      .requests-section {
        margin-top: 24px;
        text-align: left;
      }
      .requests-label {
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.06em;
        color: #9fadbc;
        margin-bottom: 8px;
        padding-left: 4px;
      }
      .requests-list {
        display: flex;
        flex-direction: column;
        gap: 8px; /* Clean separation between item blocks */
        width: 100%;
      }
      .request-row {
        background: #22272b;
        border: 1px solid #3d444d;
        border-radius: 8px;
        padding: 10px 12px;
        cursor: pointer;
        display: flex;
        flex-direction: column;
        gap: 8px;
        transition:
          background 0.2s ease,
          border-color 0.2s ease;
      }
      .request-row:hover {
        background: #2c333a;
        border-color: #738496;
      }
      .request-content-wrapper {
        display: flex;
        gap: 8px;
        align-items: flex-start;
      }
      /* Trello style item decoration indicator */
      .card-decor-icon {
        margin-top: 2px;
        color: #9fadbc;
        flex-shrink: 0;
      }
      .request-text {
        font-size: 13px;
        color: #b6c2cf;
        line-height: 1.5;
      }
      .request-text b {
        color: #fff;
        font-weight: 600;
      }
      .request-time {
        font-size: 11px;
        color: #9fadbc;
        white-space: nowrap;
        flex-shrink: 0;
        padding-top: 2px;
      }
      .requests-empty {
        padding: 24px;
        font-size: 13px;
        color: #9fadbc;
        text-align: center;
        background: #22272b;
        border-radius: 8px;
        border: 1px dashed #3d444d;
      }

      .request-main {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        gap: 16px;
      }
      .request-actions {
        display: flex;
        justify-content: flex-end;
        gap: 8px;
        margin-top: 8px;
      }
      .action-btn {
        appearance: none;
        border: none;
        border-radius: 6px;
        padding: 6px 12px;
        font-size: 12px;
        font-weight: 600;
        cursor: pointer;
        display: flex;
        align-items: center;
        gap: 4px;
      }
      .approve-btn {
        background: #1c3829;
        color: #4bce97;
      }
      .approve-btn:hover:not(:disabled) {
        background: #204b30;
      }
      .decline-btn {
        background: #3d1f1f;
        color: #f87168;
      }
      .decline-btn:hover:not(:disabled) {
        background: #4a2323;
      }
      .action-btn:disabled {
        opacity: 0.5;
        cursor: default;
      }
      .request-row.responded .request-actions {
        display: none;
      }
      .response-pill {
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.03em;
        padding: 4px 10px;
        border-radius: 12px;
        align-self: flex-end;
      }
      .response-pill.approved {
        background: #1c3829;
        color: #4bce97;
      }
      .response-pill.declined {
        background: #3d1f1f;
        color: #f87168;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="default-view" id="defaultView">
        <div class="icon-circle">
          <svg viewBox="0 0 24 24" fill="none">
            <path
              d="M4 12l5 5L20 6"
              stroke="#4bce97"
              stroke-width="2.5"
              stroke-linecap="round"
              stroke-linejoin="round"
            />
          </svg>
        </div>
        <h2>Request approvals from your board mates</h2>
        <p class="desc">To get started, authorize this Power-Up with Trello.</p>
        <button class="btn" id="authBtn">Authorize Easy Approve</button>
        <div class="status" id="statusMsg"></div>
      </div>

      <div class="success-view" id="successView">
        <div class="success-icon">
          <svg viewBox="0 0 24 24" fill="none">
            <path
              d="M4 12l5 5L20 6"
              stroke="#4bce97"
              stroke-width="2.5"
              stroke-linecap="round"
              stroke-linejoin="round"
            />
          </svg>
        </div>
        <h2>Authorized successfully!</h2>
        <p class="desc">
          You're all set. You can now manage your approval requests directly on
          this board.
        </p>

        <button
          class="btn"
          id="viewRequestsBtn"
          style="
            background: #2c333a;
            color: #b6c2cf;
            border: 1px solid #4d5661;
            margin-top: 10px;
          "
        >
          View Pending Requests
        </button>
      </div>

      <div
        class="requests-view"
        id="requestsView"
        style="display: none; text-align: left"
      >
        <div class="requests-section">
          <div class="requests-list" id="requestsList"></div>
          <div class="requests-empty" id="requestsEmpty" style="display: none">
            No approval requests are waiting on you right now.
          </div>
        </div>
      </div>
    </div>

    <script>
      var t = window.TrelloPowerUp.iframe();

      // ⚠️ Replace with your real Power-Up API key from https://trello.com/power-ups/admin
      var API_KEY = "be0af9c0de485c191cd377fdcb42e793";
      // Must match the PLUGIN_ID used in connector.html
      var PLUGIN_ID = "6a468ccfcafdf3b68af7fa8f";

      var defaultView = document.getElementById("defaultView");
      var successView = document.getElementById("successView");
      var authBtn = document.getElementById("authBtn");
      var statusMsg = document.getElementById("statusMsg");
      var requestsList = document.getElementById("requestsList");
      var requestsEmpty = document.getElementById("requestsEmpty");
      var currentMemberId = null;

      function escapeHtml(str) {
        if (!str) return "";
        var map = {
          "&": "&amp;",
          "<": "&lt;",
          ">": "&gt;",
          '"': "&quot;",
          "'": "&#39;",
        };
        return str.replace(/[&<>"']/g, function (c) {
          return map[c];
        });
      }

      function renderRequestsList(requests) {
        if (!requests || requests.length === 0) {
          requestsList.innerHTML = "";
          requestsEmpty.style.display = "block";
          t.sizeTo("body").catch(function () {});
          return;
        }

        requestsEmpty.style.display = "none";
        requestsList.innerHTML = requests
          .map(function (r) {
            var cardUrl = r.cardShortLink
              ? "https://trello.com/c/" + r.cardShortLink
              : "";
            return (
              '<div class="request-row" data-url="' +
              cardUrl +
              '" data-card-id="' +
              r.cardId +
              '">' +
              '<div class="request-main">' +
              '<div class="request-content-wrapper">' +
              '<span class="card-decor-icon">📋</span> ' +
              '<div class="request-text">' +
              "<b>" +
              escapeHtml(r.requesterName || "Someone") +
              "</b> requested your approval on <b>" +
              escapeHtml(r.cardName || "Untitled") +
              "</b>" +
              "</div>" +
              "</div>" +
              '<div class="request-time">' +
              ApprovalsShared.timeAgo(r.createdAt) +
              "</div>" +
              "</div>" +
              '<div class="request-actions">' +
              '<button class="action-btn approve-btn" data-action="approved">✓ Approve</button>' +
              '<button class="action-btn decline-btn" data-action="declined">✕ Decline</button>' +
              "</div>" +
              "</div>"
            );
          })
          .join("");

        Array.prototype.forEach.call(
          requestsList.querySelectorAll(".request-row"),
          function (row) {
            row.addEventListener("click", function () {
              var url = row.getAttribute("data-url");
              if (url) t.navigate({ url: url });
            });

            Array.prototype.forEach.call(
              row.querySelectorAll(".action-btn"),
              function (btn) {
                btn.addEventListener("click", function (e) {
                  e.stopPropagation();
                  handleRespond(row, btn.getAttribute("data-action"));
                });
              },
            );
          },
        );

        t.sizeTo("body").catch(function () {});
      }

      function handleRespond(row, newStatus) {
        var cardId = row.getAttribute("data-card-id");
        var buttons = row.querySelectorAll(".action-btn");

        Array.prototype.forEach.call(buttons, function (b) {
          b.disabled = true;
        });

        ApprovalsShared.respondToRequestFromBoard(
          t,
          cardId,
          currentMemberId,
          newStatus,
        )
          .then(function (updatedRequest) {
            row.classList.add("responded");
            var actions = row.querySelector(".request-actions");
            actions.innerHTML =
              '<span class="response-pill ' +
              newStatus +
              '">' +
              (newStatus === "approved" ? "Approved" : "Declined") +
              "</span>";
            t.sizeTo("body").catch(function () {});
          })
          .catch(function (err) {
            console.error("Easy Approve: failed to update request", err);
            Array.prototype.forEach.call(buttons, function (b) {
              b.disabled = false;
            });
          });
      }

      function loadPendingRequests(token) {
        return Promise.all([t.board("id"), t.member("id")])
          .then(function (results) {
            var boardId = results[0].id;
            var memberId = results[1].id;
            currentMemberId = memberId;
            var url =
              "https://api.trello.com/1/boards/" +
              boardId +
              "/cards?pluginData=true&fields=id,name,shortLink&key=" +
              API_KEY +
              "&token=" +
              encodeURIComponent(token);

            return fetch(url).then(function (res) {
              if (!res.ok) throw new Error("Failed to fetch board cards");
              return res.json().then(function (cards) {
                return ApprovalsShared.getPendingRequestsForMember(
                  cards,
                  memberId,
                  PLUGIN_ID,
                );
              });
            });
          })
          .then(renderRequestsList)
          .catch(function (err) {
            console.error("Easy Approve: loading pending requests failed", err);
            renderRequestsList([]);
          });
      }

      var viewRequestsBtn = document.getElementById("viewRequestsBtn");

      function showSuccess(token) {
        defaultView.classList.add("hide");
        successView.classList.add("show");
        t.sizeTo("body").catch(function () {});

        // Mark that the user has now seen this screen, so future opens skip
        // straight to the pending-requests view instead.
        t.set("member", "private", "hasSeenAuthSuccess", true);

        viewRequestsBtn.addEventListener("click", function () {
          showRequestsView(token);
        });
      }

      function showRequestsView(token) {
        defaultView.classList.add("hide");
        successView.classList.remove("show");
        document.getElementById("requestsView").style.display = "block";
        t.sizeTo("body").catch(function () {});
        loadPendingRequests(token);
      }

      function setStatus(text, type) {
        statusMsg.textContent = text || "";
        statusMsg.className = "status" + (type ? " " + type : "");
      }

      // If already authorized, skip straight to success view
      t.get("member", "private", "token").then(function (token) {
        if (!token) {
          t.sizeTo("body").catch(function () {});
          return;
        }
        return t
          .get("member", "private", "hasSeenAuthSuccess")
          .then(function (seen) {
            if (seen) {
              showRequestsView(token);
            } else {
              showSuccess(token);
            }
          });
      });

      authBtn.addEventListener("click", function () {
        authBtn.disabled = true;
        authBtn.innerHTML =
          '<span class="spinner"></span>Waiting for authorization…';
        setStatus("");

        var returnUrl = window.origin + "/authorize-return.html";
        var authUrl =
          "https://trello.com/1/authorize" +
          "?expiration=never" +
          "&scope=read,write" +
          "&key=" +
          API_KEY +
          "&callback_method=fragment" +
          "&return_url=" +
          encodeURIComponent(returnUrl);

        var authorizeOpts = { height: 680, width: 580 };
        var authorizedToken;

        t.authorize(authUrl, authorizeOpts)
          .then(function (token) {
            authorizedToken = token;
            return t.set("member", "private", "token", token);
          })
          .then(function () {
            showSuccess(authorizedToken);
          })
          .catch(function (err) {
            authBtn.disabled = false;
            authBtn.textContent = "Authorize Easy Approve";
            setStatus(
              "Authorization was cancelled or failed. Please try again.",
              "error",
            );
          });
      });
    </script>
  </body>
</html>
