<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <script src="https://p.trellocdn.com/power-up.min.js"></script>
    <style>
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica,
          Arial, sans-serif;
        background: #1d2125;
        color: #b6c2cf;
      }
      .wrap {
        padding: 28px 24px 24px;
        text-align: center;
      }
      .icon-circle {
        width: 56px;
        height: 56px;
        margin: 0 auto 16px;
        border-radius: 50%;
        background: #1c3829;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .icon-circle svg {
        width: 28px;
        height: 28px;
      }
      h2 {
        margin: 0 0 6px;
        font-size: 16px;
        font-weight: 600;
        color: #fff;
      }
      p.desc {
        margin: 0 0 22px;
        font-size: 13px;
        line-height: 1.5;
        color: #9fadbc;
      }
      .btn {
        appearance: none;
        border: none;
        width: 100%;
        padding: 10px 16px;
        font-size: 14px;
        font-weight: 600;
        border-radius: 8px;
        cursor: pointer;
        background: #579dff;
        color: #091e42;
        transition: background 0.15s ease;
      }
      .btn:hover {
        background: #85b8ff;
      }
      .btn:disabled {
        background: #2c333a;
        color: #738496;
        cursor: default;
      }
      .status {
        margin-top: 14px;
        font-size: 12px;
        min-height: 16px;
      }
      .status.error {
        color: #f87168;
      }
      .status.success {
        color: #4bce97;
      }
      .success-view {
        display: none;
      }
      .success-view.show {
        display: block;
      }
      .default-view.hide {
        display: none;
      }
      .success-icon {
        width: 56px;
        height: 56px;
        margin: 0 auto 16px;
        border-radius: 50%;
        background: #1c3829;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .spinner {
        display: inline-block;
        width: 14px;
        height: 14px;
        border: 2px solid rgba(9, 30, 66, 0.3);
        border-top-color: #091e42;
        border-radius: 50%;
        animation: spin 0.7s linear infinite;
        vertical-align: middle;
        margin-right: 6px;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="default-view" id="defaultView">
        <div class="icon-circle">
          <svg viewBox="0 0 24 24" fill="none">
            <path
              d="M4 12l5 5L20 6"
              stroke="#4bce97"
              stroke-width="2.5"
              stroke-linecap="round"
              stroke-linejoin="round"
            />
          </svg>
        </div>
        <h2>Request approvals from your board mates</h2>
        <p class="desc">To get started, authorize this Power-Up with Trello.</p>
        <button class="btn" id="authBtn">Authorize Easy Approve</button>
        <div class="status" id="statusMsg"></div>
      </div>

      <div class="success-view" id="successView">
        <div class="success-icon">
          <svg viewBox="0 0 24 24" fill="none">
            <path
              d="M4 12l5 5L20 6"
              stroke="#4bce97"
              stroke-width="2.5"
              stroke-linecap="round"
              stroke-linejoin="round"
            />
          </svg>
        </div>
        <h2>Authorized successfully!</h2>
        <p class="desc">
          You're all set. You can now request and manage approvals on this
          board.
        </p>
      </div>
    </div>

    <script>
      var t = window.TrelloPowerUp.iframe();

      // ⚠️ Replace with your real Power-Up API key from https://trello.com/power-ups/admin
      var API_KEY = "be0af9c0de485c191cd377fdcb42e793";

      var defaultView = document.getElementById("defaultView");
      var successView = document.getElementById("successView");
      var authBtn = document.getElementById("authBtn");
      var statusMsg = document.getElementById("statusMsg");

      function showSuccess() {
        defaultView.classList.add("hide");
        successView.classList.add("show");
        t.sizeTo("body");
      }

      function setStatus(text, type) {
        statusMsg.textContent = text || "";
        statusMsg.className = "status" + (type ? " " + type : "");
      }

      // If already authorized, skip straight to success view
      t.get("member", "private", "token").then(function (token) {
        if (token) {
          showSuccess();
        }
      });

      authBtn.addEventListener("click", function () {
        authBtn.disabled = true;
        authBtn.innerHTML =
          '<span class="spinner"></span>Waiting for authorization…';
        setStatus("");

        var returnUrl = window.origin + "/authorize-return.html";
        var authUrl =
          "https://trello.com/1/authorize" +
          "?expiration=never" +
          "&scope=read,write" +
          "&key=" +
          API_KEY +
          "&callback_method=fragment" +
          "&return_url=" +
          encodeURIComponent(returnUrl);

        var authorizeOpts = { height: 680, width: 580 };

        t.authorize(authUrl, authorizeOpts)
          .then(function (token) {
            return t.set("member", "private", "token", token);
          })
          .then(function () {
            showSuccess();
          })
          .catch(function (err) {
            authBtn.disabled = false;
            authBtn.textContent = "Authorize Easy Approve";
            setStatus(
              "Authorization was cancelled or failed. Please try again.",
              "error",
            );
          });
      });
    </script>
  </body>
</html>
