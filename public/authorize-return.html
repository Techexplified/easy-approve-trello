<!DOCTYPE html>
<html>
<head><meta charset="utf-8" /></head>
<body style="background:#1d2125;">
  <script>
    // Trello redirects here with the token in the URL fragment, e.g. #token=abc123
    var token;
    var authorize;

    try {
      if (window.opener && typeof window.opener.authorize === 'function') {
        authorize = window.opener.authorize;
      }
    } catch (e) {
      // cross-origin/security restrictions, fall back below
    }

    token = window.location.hash.replace('#token=', '');

    if (authorize && token) {
      authorize(token);
    } else if (token) {
      localStorage.setItem('token', token);
    }

    // Give the opener a moment to process, then close this window
    setTimeout(function () {
      window.close();
    }, 400);
  </script>
</body>
</html>
