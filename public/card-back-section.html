<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <script src="https://p.trellocdn.com/power-up.min.js"></script>
    <script src="./approvals.js"></script>
    <style>
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        padding: 4px 0 12px;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica,
          Arial, sans-serif;
        background: transparent;
        color: #b6c2cf;
      }
      .row {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 8px 4px;
      }
      .avatar-img,
      .avatar-fallback {
        width: 32px;
        height: 32px;
        border-radius: 50%;
        flex-shrink: 0;
      }
      .avatar-fallback {
        display: flex;
        align-items: center;
        justify-content: center;
        color: #fff;
        font-size: 12px;
        font-weight: 700;
      }
      .info {
        flex: 1;
        min-width: 0;
      }
      .name {
        font-size: 14px;
        color: #fff;
        font-weight: 500;
      }
      .username {
        font-size: 12px;
        color: #8c9bab;
      }
      .actions {
        display: flex;
        gap: 8px;
      }
      .action-btn {
        appearance: none;
        border: none;
        border-radius: 6px;
        padding: 6px 12px;
        font-size: 12px;
        font-weight: 600;
        cursor: pointer;
        display: flex;
        align-items: center;
        gap: 4px;
      }
      .approve-btn {
        background: #1c3829;
        color: #4bce97;
      }
      .approve-btn:hover {
        background: #204b30;
      }
      .decline-btn {
        background: #3d1f1f;
        color: #f87168;
      }
      .decline-btn:hover {
        background: #4a2323;
      }
      .pill {
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.03em;
        padding: 4px 10px;
        border-radius: 12px;
      }
      .pill.pending {
        background: #3d3560;
        color: #b8a4ff;
      }
      .pill.approved {
        background: #1c3829;
        color: #4bce97;
      }
      .pill.declined {
        background: #3d1f1f;
        color: #f87168;
      }
      .banner {
        margin: 10px 4px 4px;
        padding: 10px 12px;
        border-radius: 8px;
        font-size: 13px;
        font-weight: 500;
      }
      .banner.pending {
        background: #e6defc;
        color: #352c63;
      }
      .banner.approved {
        background: #baf3db;
        color: #164b35;
      }
      .banner.declined {
        background: #ffd5d2;
        color: #5d1f1c;
      }
      .banner b {
        font-weight: 700;
      }
      .empty {
        padding: 8px 4px;
        font-size: 13px;
        color: #8c9bab;
      }
    </style>
  </head>
  <body>
    <div id="content"></div>

    <script>
      var t = window.TrelloPowerUp.iframe();
      var myId = null;

      function checkIcon() {
        return '<svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M4 12l5 5L20 6" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></svg>';
      }
      function xIcon() {
        return '<svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M6 6l12 12M18 6L6 18" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></svg>';
      }

      function render(request) {
        var contentEl = document.getElementById("content");

        if (!request || !request.approvers || request.approvers.length === 0) {
          contentEl.innerHTML =
            '<div class="empty">No approval request on this card yet.</div>';
          t.sizeTo("body");
          return;
        }

        var overall = ApprovalsShared.getOverallStatus(request);
        var approved = ApprovalsShared.approvedCount(request);
        var total = request.approvers.length;

        var rowsHtml = request.approvers
          .map(function (a) {
            var isMe = a.id === myId;
            var actionOrPill;

            if (isMe && a.status === "pending") {
              actionOrPill =
                '<div class="actions">' +
                '<button class="action-btn approve-btn" data-id="' +
                a.id +
                '" data-action="approved">' +
                checkIcon() +
                " Approve</button>" +
                '<button class="action-btn decline-btn" data-id="' +
                a.id +
                '" data-action="declined">' +
                xIcon() +
                " Decline</button>" +
                "</div>";
            } else {
              actionOrPill =
                '<span class="pill ' +
                a.status +
                '">' +
                a.status.toUpperCase() +
                "</span>";
            }

            return (
              '<div class="row">' +
              ApprovalsShared.avatarHtml(a) +
              '<div class="info">' +
              '<div class="name">' +
              a.fullName +
              "</div>" +
              '<div class="username">@' +
              a.username +
              "</div>" +
              "</div>" +
              actionOrPill +
              "</div>"
            );
          })
          .join("");

        var bannerHtml;
        if (overall === "approved") {
          bannerHtml =
            '<div class="banner approved"><b>Approved</b> — all ' +
            total +
            " members approved this request.</div>";
        } else if (overall === "declined") {
          var decliner = request.approvers.find(function (a) {
            return a.status === "declined";
          });
          bannerHtml =
            '<div class="banner declined"><b>Declined</b> by ' +
            decliner.fullName +
            ".</div>";
        } else {
          bannerHtml =
            '<div class="banner pending"><b>Pending</b> — requires a minimum of ' +
            total +
            " approvals (" +
            approved +
            "/" +
            total +
            " so far).</div>";
        }

        contentEl.innerHTML = rowsHtml + bannerHtml;

        Array.prototype.forEach.call(
          contentEl.querySelectorAll(".action-btn"),
          function (btn) {
            btn.addEventListener("click", function (e) {
              var action = btn.getAttribute("data-action");
              var id = btn.getAttribute("data-id");

              if (action === "declined") {
                // Show a popup so the user can optionally leave a comment
                // explaining why they're declining before it's recorded.
                t.popup({
                  title: "Decline Request",
                  url:
                    "./decline-reason.html?memberId=" + encodeURIComponent(id),
                  height: 230,
                  mouseEvent: e,
                })
                  .then(function () {
                    // Refresh once the popup closes, since the decline (and
                    // any comment) happens inside decline-reason.html.
                    return ApprovalsShared.fetchCardRequest(t).then(render);
                  })
                  .catch(function (err) {
                    console.error("Decline popup failed:", err);
                  });
              } else {
                respondToRequest(request, id, action);
              }
            });
          },
        );

        t.sizeTo("body");
      }

      function respondToRequest(request, memberId, newStatus) {
        var updated = JSON.parse(JSON.stringify(request));
        updated.approvers = updated.approvers.map(function (a) {
          if (a.id === memberId) {
            a.status = newStatus;
            a.respondedAt = Date.now();
          }
          return a;
        });
        ApprovalsShared.saveCardRequest(t, updated).then(function () {
          render(updated);
        });
      }

      t.member("id")
        .then(function (member) {
          myId = member.id;
          return ApprovalsShared.fetchCardRequest(t);
        })
        .then(function (request) {
          render(request);
        });

      // keep the section in sync if the request changes elsewhere (e.g. another tab)
      t.render(function () {
        return ApprovalsShared.fetchCardRequest(t).then(render);
      });
    </script>
  </body>
</html>
