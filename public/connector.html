<!doctype html>
<html>
  <head>
    <script src="https://p.trellocdn.com/power-up.min.js"></script>
    <script src="./approvals.js"></script>
  </head>
  <body>
    <script>
      var ICON_WHITE =
        "https://easy-approve-beta.vercel.app/images/icon-white.svg";
      var ICON_BLACK =
        "https://easy-approve-beta.vercel.app/images/icon-black.svg";

      // Gear icon used for the "action" button in the card-back-section
      // header (top-right of the "Approvals" section). Built as an inline
      // data URI so no extra network request/asset is needed.
      var GEAR_ICON =
        "data:image/svg+xml;base64," +
        btoa(
          unescape(
            encodeURIComponent(
              '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="#9fadbc" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">' +
                '<circle cx="12" cy="12" r="3"></circle>' +
                '<path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path>' +
                "</svg>",
            ),
          ),
        );

      // Must match the API_KEY used in popup.html / decline-reason.html
      var API_KEY = "be0af9c0de485c191cd377fdcb42e793";
      // From https://trello.com/power-ups/admin → your Power-Up → "API" tab
      var PLUGIN_ID = "6a468ccfcafdf3b68af7fa8f";

      // ---------------------------------------------------------------
      // Note on badge icons:
      //
      // ApprovalsShared.iconWithBadge() builds a composite SVG (base icon
      // + red count circle). It receives the base icon already inlined as
      // a data: URI (via ApprovalsShared.iconAsDataUri()) before it's ever
      // passed in, so the composite SVG's <image href="..."> always points
      // at a data: URI, never an external URL. There's nothing further to
      // pre-fetch here — a previous attempt to "fix" broken badge icons by
      // pre-fetching raw icon markup (iconInnerPromise/fetchIconInner) was
      // dead code: it computed values that were never actually used, and
      // it added two extra external network round-trips that every
      // board-buttons call had to wait on before a button could render at
      // all. That extra, unused latency is the most likely reason the
      // toolbar button intermittently failed to show up. Removed.
      // ---------------------------------------------------------------

      window.TrelloPowerUp.initialize({
        "board-buttons": function (t, opts) {
          function buildButton(iconDark, iconLight) {
            return [
              {
                icon: { dark: iconDark, light: iconLight },
                text: "Easy Approve",
                callback: function (t) {
                  return t.popup({
                    title: "Easy Approve",
                    url: "./popup.html",
                    height: 300,
                    width: 520,
                  });
                },
              },
            ];
          }

          return Promise.all([
            t.board("id"),
            t.member("id"),
            t.get("member", "private", "token"),
          ])
            .then(function (results) {
              var boardId = results[0].id;
              var memberId = results[1].id;
              var token = results[2];

              if (!token) {
                // Not authorized yet — no way to fetch board cards, show plain icon.
                return buildButton(ICON_WHITE, ICON_BLACK);
              }

              var url =
                "https://api.trello.com/1/boards/" +
                boardId +
                "/cards?pluginData=true&fields=id&key=" +
                API_KEY +
                "&token=" +
                encodeURIComponent(token);

              return fetch(url)
                .then(function (res) {
                  if (!res.ok) throw new Error("Failed to fetch board cards");
                  return res.json();
                })
                .then(function (cards) {
                  var count = ApprovalsShared.countPendingForMember(
                    cards,
                    memberId,
                    PLUGIN_ID,
                  );

                  if (!count) {
                    return buildButton(ICON_WHITE, ICON_BLACK);
                  }

                  // Only inline the icon (fetch + data URI) when we actually
                  // need to draw a badge on top of it.
                  return Promise.all([
                    ApprovalsShared.iconAsDataUri(ICON_WHITE),
                    ApprovalsShared.iconAsDataUri(ICON_BLACK),
                  ]).then(function (dataUris) {
                    return buildButton(
                      ApprovalsShared.iconWithBadge(dataUris[0], count),
                      ApprovalsShared.iconWithBadge(dataUris[1], count),
                    );
                  });
                })
                .catch(function (err) {
                  console.error("Easy Approve: badge count failed", err);
                  return buildButton(ICON_WHITE, ICON_BLACK);
                });
            })
            .catch(function (err) {
              // Belt-and-suspenders: if t.board()/t.member()/t.get() ever
              // reject (e.g. a brand-new member/board with no plugin data
              // yet), we must still return a button. Previously there was
              // no catch on this outer chain, so a rejection here meant
              // board-buttons resolved to nothing and the toolbar button
              // simply never appeared — with no error visible to the user.
              console.error("Easy Approve: board-buttons failed", err);
              return buildButton(ICON_WHITE, ICON_BLACK);
            });
        },

        "card-detail-badges": function (t, opts) {
          return ApprovalsShared.fetchCardRequest(t).then(function (request) {
            if (
              !request ||
              !request.approvers ||
              request.approvers.length === 0
            ) {
              return [
                {
                  title: "Easy Approve",
                  text: "Request for Approval",
                  callback: function (t) {
                    return t.popup({
                      title: "Easy Approve",
                      url: "./select-members.html",
                      height: 420,
                    });
                  },
                },
              ];
            }

            return t.member("id").then(function (member) {
              var overall = ApprovalsShared.getOverallStatus(request);
              var approved = ApprovalsShared.approvedCount(request);
              var total = request.approvers.length;
              var mine = request.approvers.find(function (a) {
                return a.id === member.id;
              });

              if (overall === "declined") {
                return [{ title: "Approvals", text: "Declined", color: "red" }];
              }
              if (overall === "approved") {
                return [
                  { title: "Approvals", text: "Approved", color: "green" },
                ];
              }
              if (mine && mine.status === "pending") {
                return [
                  {
                    title: "Easy Approve",
                    text: "🔔 Pending your approval",
                    color: "purple",
                  },
                ];
              }
              return [
                {
                  title: "Easy Approve",
                  text: "Pending (" + approved + "/" + total + ")",
                  color: "purple",
                },
              ];
            });
          });
        },

        "card-badges": function (t, opts) {
          return ApprovalsShared.fetchCardRequest(t).then(function (request) {
            if (
              !request ||
              !request.approvers ||
              request.approvers.length === 0
            ) {
              return [];
            }

            return t.member("id").then(function (member) {
              var overall = ApprovalsShared.getOverallStatus(request);
              var approved = ApprovalsShared.approvedCount(request);
              var total = request.approvers.length;
              var mine = request.approvers.find(function (a) {
                return a.id === member.id;
              });

              if (overall === "declined") {
                return [{ text: "Declined", color: "red" }];
              }
              if (overall === "approved") {
                return [{ text: "Approved", color: "green" }];
              }
              if (mine && mine.status === "pending") {
                return [{ text: "🔔 Pending your approval", color: "purple" }];
              }
              return [
                {
                  text: "Pending (" + approved + "/" + total + ")",
                  color: "purple",
                },
              ];
            });
          });
        },

        "card-back-section": function (t, opts) {
          return ApprovalsShared.fetchCardRequest(t).then(function (request) {
            // No request on this card — don't show the section at all
            if (!request) {
              return t.NotHandled();
            }

            return {
              title: "Easy Approve",
              icon: ICON_BLACK,
              action: {
                // Trello's card-back-section only documents/guarantees a
                // "text" property for the header action button — an
                // icon-only action (no text) was silently not rendering.
                // Keep the icon too in case Trello does use it, but text
                // is what actually makes the button show up.
                text: "⚙",
                icon: GEAR_ICON,
                callback: function (t) {
                  return t.popup({
                    title: "Easy Approve",
                    items: [
                      {
                        text: "Change approvers...",
                        callback: function (t) {
                          return t.popup({
                            title: "Easy Approve",
                            url: "./select-members.html?mode=edit",
                            height: 420,
                          });
                        },
                      },
                      {
                        text: "Reset approvals...",
                        callback: function (t) {
                          return t.popup({
                            title: "Reset approvals?",
                            url: "./confirm-action.html?action=reset",
                            height: 200,
                          });
                        },
                      },
                      {
                        text: "Remove all reviewers...",
                        callback: function (t) {
                          return t.popup({
                            title: "Remove all reviewers?",
                            url: "./confirm-action.html?action=remove",
                            height: 200,
                          });
                        },
                      },
                    ],
                  });
                },
              },
              content: {
                type: "iframe",
                url: t.signUrl("./card-back-section.html"),
                height: 200,
              },
            };
          });
        },

        // ---------------------------------------------------------------
        // Native authorization affordance.
        //
        // Until now the ONLY way to reach popup.html's "Authorize Easy
        // Approve" button was the custom board-buttons toolbar button.
        // If that button ever fails to render (network hiccup, timing,
        // an unhandled rejection like the one fixed above, etc.) there
        // was no way in at all — which is exactly what the reviewer hit.
        //
        // authorization-status + show-authorization plug into Trello's
        // own "Authorize Account" prompt (under the Power-Up's gear
        // icon), giving a second, Trello-native path to the same
        // popup.html flow that doesn't depend on our own UI rendering.
        // ---------------------------------------------------------------
        "authorization-status": function (t, opts) {
          return t.get("member", "private", "token").then(function (token) {
            return { authorized: !!token };
          });
        },

        "show-authorization": function (t, opts) {
          return t.popup({
            title: "Easy Approve",
            url: "./popup.html",
            height: 300,
            width: 520,
          });
        },
      });
    </script>
  </body>
</html>
